{% extends "base.html" %}
{% block title %}List Vehicle | Yours To Rent{% endblock %}
{% block content %}
<h2>Add Listing</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="title" placeholder="Vehicle title" required><br><br>

<textarea name="description" placeholder="Description" required></textarea><br><br>

<select name="category" required>
<option value="car">Car</option>
<option value="tool">Tool</option>
<option value="equipment">Equipment</option>
</select><br><br>

<input type="number" name="price_day" placeholder="Price per day" step="0.01" required><br><br>
<input type="number" name="price_hour" placeholder="Price per hour (optional)" step="0.01"><br><br>

<input type="text" name="location" placeholder="Location" required><br><br>

<button type="submit">Create Listing</button>

</form>
{% endblock %}
