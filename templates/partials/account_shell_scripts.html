<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

(function () {

  function toggleSidebar() {

    var el = document.getElementById("sidebar");

    if (el) el.classList.toggle("active");

    document.body.classList.toggle("ytr-sidebar-open");

  }

  window.toggleSidebar = toggleSidebar;



  function closeSidebarIfWide() {

    if (window.matchMedia("(min-width: 1200px)").matches) {

      var el = document.getElementById("sidebar");

      if (el) el.classList.remove("active");

      document.body.classList.remove("ytr-sidebar-open");

    }

  }



  window.addEventListener("resize", closeSidebarIfWide);



  document.addEventListener("keydown", function (e) {

    if (e.key === "Escape" && document.body.classList.contains("ytr-sidebar-open")) {

      toggleSidebar();

    }

  });



  var bd = document.getElementById("ytrSidebarBackdrop");

  if (bd) {

    bd.addEventListener("click", function () {

      if (document.body.classList.contains("ytr-sidebar-open")) toggleSidebar();

    });

  }

})();

</script>
