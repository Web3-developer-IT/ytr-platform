{% extends "base.html" %}
{% block title %}Sign Up | Yours To Rent{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="p-4 rounded-4" style="background:#111;border:1px solid rgba(255,255,255,.08)">
            <h2 class="mb-3">Create Account</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <input class="form-control bg-dark text-white border-secondary" type="text" name="username" placeholder="Username" required>
                </div>
                <div class="mb-3">
                    <input class="form-control bg-dark text-white border-secondary" type="email" name="email" placeholder="Email" required>
                </div>
                <div class="mb-3">
                    <input class="form-control bg-dark text-white border-secondary" type="password" name="password" placeholder="Password" required>
                </div>
                <button class="btn btn-warning" type="submit">Register</button>
            </form>
            <p class="mt-3 mb-0 text-white-50">Already have an account? <a href="{% url 'login' %}" class="text-warning">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
